# Flask app configuration for the knowledge base viewer (Obsidian lite)

# Server
# host: 0.0.0.0 to bind all interfaces (accessible from other machines on the network)
host: localhost
port: 5000
debug: false

# Search
search_top_k: 5

# KB Q&A settings (requires Ollama or compatible endpoint)
kb_qa:
  enabled: true
  api_url: http://localhost:11434
  model: phi4-mini
  top_k: 5
  max_tokens: 512

# Graph
graph:
  node_min_size: 4
  node_max_size: 20
  charge_strength: -120
  link_distance: 80

# Theme
theme: dark

# Stats page — additional stopwords for the word cloud.
# The built-in list covers common English function words (the, and, is, than…).
# Add domain-specific words that are frequent in your KB but carry no useful
# signal for your use case — e.g. for a finance KB: time, years, people, money
# stats_stopwords:
#   - time
#   - years
#   - people
